<!DOCTYPE html>
<html>

<head>
    <title>Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <h2>Login</h2>
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Login</button>
</head>

<body class="bg-light">

    <div class="container py-4">

        <h1 class="text-center mb-4">🛒 Shop Online</h1>

        <!-- FORM -->
        <div class="card p-3 mb-4">
            <h4>Thêm sản phẩm</h4>
            <div class="row">
                <div class="col">
                    <input type="text" id="name" class="form-control" placeholder="Tên sản phẩm">
                </div>
                <div class="col">
                    <input type="number" id="price" class="form-control" placeholder="Giá">
                </div>
                <div class="col">
                    <input type="text" id="image" class="form-control" placeholder="Link ảnh">
                </div>
                <div class="col">
                    <button class="btn btn-primary w-100" onclick="addProduct()">Thêm</button>
                </div>
            </div>
        </div>

        <!-- DANH SÁCH -->
        <div class="row" id="product-list"></div>

        <!-- GIỎ HÀNG -->
        <div class="card mt-4 p-3">
            <h4>🛒 Giỏ hàng</h4>
            <div id="cart"></div>
            <button class="btn btn-success mt-3" onclick="checkout()">Thanh toán</button>
        </div>

    </div>

    <script src="script.js"></script>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
